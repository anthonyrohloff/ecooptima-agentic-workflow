<!DOCTYPE html>
<html>
    <head>
        <title>Consumer</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>

    <body>
        <!-- Page Layout -->
        <div class="layout">
            <!-- Sidebar -->
            <div class="sidebar">

                <h2 class="logo">
                    <a href="{{ url_for('home') }}">EcoOptima</a>
                </h2>

                <a href="{{ url_for('about') }}" class="dropdown-toggle nav-item">
                    About
                </a>

                <div class="dropdown">
                    <a href="{{ url_for('home') }}" class="nav-item">
                        Dashboard
                    </a>

                    <div class="dropdown-menu">
                        <a href="{{ url_for('academic') }}">Academic</a>
                        <a href="{{ url_for('business') }}">Business</a>
                        <a href="{{ url_for('consumer') }}" class="nav-item active">Consumer</a>
                        <a href="{{ url_for('community') }}">Community</a>
                        <a href="{{ url_for('government') }}">Government</a>
                    </div>
                </div>
            </div>

            <!-- Main HTML -->
            <div class="main">
                <div class="card">

                    <h1>EcoEnviorment Consumer Assistant</h1>

                    <div id="assistant-output" style="display:none;">
                        <div id="response-box">
                            <div id="response"></div>
                            <div id="charts"></div>
                        </div>
                    </div>

                    <form onsubmit="sendToFlask('analyze','consumer'); return false;">
                        <input type="text" id="userInput" name="userInput" placeholder="Try asking: What is the best way to reduce my carbon footprint as a renter?">
                        <button type="submit">Run Analysis</button>
                        <button type="button" onclick="sendToFlask('followup')">Ask Follow-up</button>
                        <button type="button" onclick="resetConversation()">Reset Conversation</button>
                    </form>
                    <div id="spinner" class="spinner" style="display:none;"></div>
                </div>
            </div>
        </div>

        <!-- Function for flask -- javascript code moved to js file where we can access it in multiple files. -->
        <script 
            src="{{ url_for('static', filename='js/common.js') }}"> 
        </script>
    </body>
</html>
