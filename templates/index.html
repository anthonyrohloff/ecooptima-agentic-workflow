<!DOCTYPE html>
<html>
    <head>
        <title>EcoOptima</title>
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>

    <body>
        <!-- Page Layout-->
        <div class="layout">
            <div class="sidebar">
                <h2 class="logo">
                    <a href="{{ url_for('home') }}">EcoOptima</a>
                </h2>

                <div class="dropdown">
                    <a href="{{ url_for('about') }}" class="dropdown-toggle nav-item">
                        About
                    </a>

                    <div class="dropdown-menu">
                        <a href="{{ url_for('academic') }}">Academic</a>
                        <a href="{{ url_for('business') }}">Business</a>
                        <a href="{{ url_for('consumer') }}">Consumer</a>
                        <a href="{{ url_for('community') }}">Community</a>
                        <a href="{{ url_for('government') }}">Government</a>
                    </div>
                </div>
                <a href="{{ url_for('home') }}" class="nav-item active">
                    Dashboard
                </a>
            </div>
            <!-- Main HTML -->
            <div class="main">
                <div class="card">

                    <h1>EcoEnviorment Assistant</h1>

                    <div id="assistant-output" style="display:none;">
                        <div id="response-box">
                            <div id="response"></div>
                            <div id="charts"></div>
                        </div>
                    </div>

                    <p class="helper-text">
                        Try asking: “What plants should I use for a mini forest in Ohio?”
                    </p>
                    <form onsubmit="sendToFlask('analyze'); return false;">
                        <input type="text" id="userInput" name="userInput">
                        <button type="submit">Run Analysis</button>
                        <button type="button" onclick="sendToFlask('followup')">Ask Follow-up</button>
                        <button type="button" onclick="resetConversation()">Reset Conversation</button>
                    </form>
                    <div id="spinner" class="spinner" style="display:none;"></div>
                </div>
            </div>
        </div>

        <!-- Function for flask -- javascript code moved to js file where we can access it in multiple files. -->
        <script 
            src="{{ url_for('static', filename='js/common.js') }}"> 
        </script>    
    </body>
</html>
